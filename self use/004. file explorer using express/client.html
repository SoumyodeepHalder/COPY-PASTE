<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            background-color: rgb(30, 30, 30);
        }

        .nav {
            height: 50px;
            width: 100%;
            display: flex;
            align-items: center;
            /* justify-content: center; */
            color: white;
            padding: 0 10px;
        }

        .nav img {
            height: 20px;
            filter: invert();
            cursor: pointer;
        }

        .path {
            width: 100%;
            margin: 0 10px;
            padding: 5px;
            font-size: 20px;
            border-radius: 10px;
            background-color: rgb(50, 50, 50);
        }

        .fileparent {
            height: 100%;
            width: 100%;
            /* background-color: rgb(70, 55, 55); */
            /* padding: 10px; */
            overflow-y: auto;
            scrollbar-width: none;
        }

        .fileparent.toggle {
            height: 100%;
            width: 100%;
            /* background-color: rgb(70, 55, 55); */
            height: calc(100vh - 50px);
            /* padding: 10px; */
            overflow-y: auto;
            scrollbar-width: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .files {
            height: 50px;
            background-color: rgb(50, 50, 50);
            color: white;
            margin: 10px;
            display: flex;
            align-items: center;
            padding: 0 50px;
            cursor: pointer;
            border-radius: 10px;
        }

        .folders {
            height: 50px;
            background-color: rgb(70, 70, 70);
            color: white;
            margin: 10px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            cursor: pointer;
            border-radius: 10px;
        }

        .videoc {
            height: 360px;
        }
    </style>
</head>

<body>
    <div class="nav">
        <img src="arrow.png" alt="">
        <div class="path"></div>
    </div>
    <div class="fileparent"></div>
    <script>
        const inp = document.querySelector('.inpc');
        const nav = document.querySelector('.nav img');
        const fileparent = document.querySelector('.fileparent');
        const pathdiv = document.querySelector('.path');
        let source_folder_name = './abcd'; // change source foldr name here ------------
        let currenturl = source_folder_name;
        let vid;
        let levi;
        let myvideo;
        let ctime = 0;
        let isplaying = false;
        let ispplaying = false;


        function getExtension(filename) {
            let temp = filename.split('.').pop();
            console.log(temp);
            return temp;
        }

        function run() {
            let local = 'http://localhost:3000/';
            let options = {
                method: "POST",
                headers: {
                    "Content-type": "application/json"
                },
                body: JSON.stringify({
                    "url": `${currenturl}`
                })
            };

            fileparent.innerHTML = '';
            let res = fetch(local, options);
            res.then((response) => response.json())
                .then((value) => {
                    if (value.isdir) {
                        // console.log(value.content);
                        value.content.forEach((text, index) => {
                            // console.log(text);
                            if ((text.includes('.') && text.split('.').pop() == 'mp4') || !text.includes('.')) {
                                // console.log('...');
                                const newDiv = document.createElement('div');
                                newDiv.textContent = text;
                                if (!text.includes('.')) {
                                    newDiv.classList.add('folders');
                                }
                                else {
                                    newDiv.classList.add('files');
                                }
                                newDiv.addEventListener('click', (e) => {
                                    currenturl = currenturl + '/' + text;
                                    run();
                                })
                                fileparent.classList.remove('toggle');
                                fileparent.appendChild(newDiv);
                            }
                        });
                    }
                    else {
                        levi = document.createElement('video');
                        levi.src = 'levi.mp4';
                        levi.controls = true;
                        levi.classList.add('videoc');
                        myvideo = levi;

                        vid = document.createElement('video');
                        vid.src = value.content;
                        vid.controls = true;
                        vid.style.display = 'none';
                        fileparent.classList.add('toggle');
                        fileparent.appendChild(levi);
                        fileparent.appendChild(vid);

                        pathdiv.innerHTML = '';
                    }
                });
            pathdiv.innerHTML = `<p>${currenturl}</p>`;
        }
        nav.addEventListener('click', () => {
            let split = currenturl.split('/');
            if (currenturl != source_folder_name) {
                currenturl = '.';
                split.pop();
                split.shift()
                split.forEach((text, index) => {
                    currenturl = currenturl + '/' + text;
                })
            }
            run();
        });

        function playvideo() {
            // console.log('playvideo ()');
            if (isplaying) {
                // console.log('if (isplaying)');
                myvideo.pause()
                isplaying = false
            }
            else {
                // console.log('isplaying else');
                myvideo.play();
                isplaying = true
            }
        }

        document.addEventListener('keydown', event => {
            // console.log ("document.addEventListener" + event.key)
            if (event.key == 'Control') {
                // console.log ('event.key== space')
                playvideo();
            }
            else if (ispplaying && event.key == 'ArrowDown') {
                // console.log('event.key!=space && ispplaying');
                vid.pause();
                vid.style.display = 'none';
                myvideo = levi;
                myvideo.style.display = 'block';
                // if (isplaying){
                //     myvideo.play ();
                // }
                isplaying = false;
                ispplaying = false;
            }
            else if (event.key == 'ArrowUp' && ispplaying == false) {
                // console.log('else if event.key== arrow up and ispplaying');
                levi.pause();
                levi.style.display = 'none';
                myvideo = vid;
                myvideo.style.display = 'block';
                myvideo.classList.add('videoc');
                // if (isplaying){
                //     myvideo.play ();
                // }
                isplaying = false;
                ispplaying = true;
            }
            else if (event.key == 'ArrowLeft') {
                vid.currentTime -= 5;
            }
            else if (event.key == 'ArrowRight') {
                vid.currentTime += 5;
            }
            else if (event.key == 'f') {
                togglefullscreen();
            }
        });
        run();
    </script>
</body>

</html>
