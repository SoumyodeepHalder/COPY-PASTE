<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chess</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            background-color: #302e2b;
        }

        .parent {
            position: relative;
            height: 100%;
            width: 100%;
        }

        .board {
            position: absolute;
            height: 640px;
            left: 100px;
            top: 30px;
            z-index: -1;
        }

        .piece {
            position: absolute;
            height: 80px;
            z-index: 2;
            transition: all 0.5s ease;
        }

        .gamelistparent {
            position: absolute;
            left: 800px;
            top: 30px;
            height: 550px;
            width: 600px;
            border-radius: 10px;
            background-color: #262522;
            overflow-y: auto;
        }

        .gamelistparent h1 {
            text-align: center;
            color: #c5c5c4;
            padding: 10px;
        }

        .gamelist {
            position: absolute;
            left: 800px;
            top: 90px;
            height: 490px;
            width: 600px;
            border-radius: 10px;
            /* background-color: white; */
            overflow-y: auto;
            /* overflow: hidden; */
            scrollbar-width: none;
            /* scrollbar-color: #302e2b #262522; */
        }

        .gamenames {
            height: 50px;
            width: 580px;
            background-color: #302e2b;
            color: #c5c5c4;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            margin: 10px;
            border-radius: 10px;
            cursor: pointer;
        }

        .btnleft {
            position: absolute;
            top: 620px;
            left: 850px;
            width: 200px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 30px;
            color: #c5c5c4;
            background-color: #262522;
            cursor: pointer;
        }

        .btnright {
            position: absolute;
            top: 620px;
            left: 1100px;
            width: 200px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 30px;
            color: #c5c5c4;
            background-color: #262522;
            cursor: pointer;
        }

        .unselectable {
            -webkit-user-select: none;
            /* Safari */
            -ms-user-select: none;
            /* Internet Explorer 10+ and Edge */
            user-select: none;
            /* Standard syntax (Chrome, Firefox, Opera) */
        }
    </style>
</head>

<body>
    <div class="parent">
        <img src="board.png" alt="" class="board">
        <img src="bp.png" alt="" class="piece bp1">
        <img src="bp.png" alt="" class="piece bp2">
        <img src="bp.png" alt="" class="piece bp3">
        <img src="bp.png" alt="" class="piece bp4">
        <img src="bp.png" alt="" class="piece bp5">
        <img src="bp.png" alt="" class="piece bp6">
        <img src="bp.png" alt="" class="piece bp7">
        <img src="bp.png" alt="" class="piece bp8">

        <img src="br.png" alt="" class="piece br">
        <img src="bn.png" alt="" class="piece bn">
        <img src="bb.png" alt="" class="piece bb">
        <img src="bq.png" alt="" class="piece bq">
        <img src="bk.png" alt="" class="piece bk">
        <img src="bb.png" alt="" class="piece bb2">
        <img src="bn.png" alt="" class="piece bn2">
        <img src="br.png" alt="" class="piece br2">


        <img src="wp.png" alt="" class="piece wp1">
        <img src="wp.png" alt="" class="piece wp2">
        <img src="wp.png" alt="" class="piece wp3">
        <img src="wp.png" alt="" class="piece wp4">
        <img src="wp.png" alt="" class="piece wp5">
        <img src="wp.png" alt="" class="piece wp6">
        <img src="wp.png" alt="" class="piece wp7">
        <img src="wp.png" alt="" class="piece wp8">

        <img src="wr.png" alt="" class="piece wr">
        <img src="wn.png" alt="" class="piece wn">
        <img src="wb.png" alt="" class="piece wb">
        <img src="wq.png" alt="" class="piece wq">
        <img src="wk.png" alt="" class="piece wk">
        <img src="wb.png" alt="" class="piece wb2">
        <img src="wn.png" alt="" class="piece wn2">
        <img src="wr.png" alt="" class="piece wr2">

        <div class="gamelistparent">
            <h1>Games</h1>
        </div>
        <div class="gamelist"></div>
        <div class="btnright unselectable">Right</div>
        <div class="btnleft unselectable">Left</div>
    </div>
    <script>

        //initializing piecies
        function initialize() {
            for (let i = 0; i < 2; i++) {
                for (let j = 0; j < 8; j++) {
                    let piece = document.getElementsByClassName(matrix[i][j])[0];
                    piece.style.left = left_const + board_const * j + 'px';
                    piece.style.top = top_const + board_const * i + 'px';
                }
            }
            for (let i = 6; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    let piece = document.getElementsByClassName(matrix[i][j])[0];
                    piece.style.left = left_const + board_const * j + 'px';
                    piece.style.top = top_const + board_const * i + 'px';
                }
            }
        }

        function forward() {
            if (movenum >= moves.length) return;
            let piece3 = document.getElementsByClassName(matrix[moves[movenum][0]][moves[movenum][1]])[0];
            if (matrix[moves[movenum][2]][moves[movenum][3]]!='empty'){
                document.getElementsByClassName(matrix[moves[movenum][2]][moves[movenum][3]])[0].style.display='none';
            }
            piece3.style.left = left_const + board_const * moves[movenum][3] + 'px';
            piece3.style.top = top_const + board_const * moves[movenum][2] + 'px';
            matrix[moves[movenum][2]][moves[movenum][3]] = matrix[moves[movenum][0]][moves[movenum][1]];
            matrix[moves[movenum][0]][moves[movenum][1]] = 'empty';
            movenum = movenum + 1;
        }

        function backward() {
            if (movenum == 0) return;
            movenum = movenum - 1;
            let piece3 = document.getElementsByClassName(matrix[moves[movenum][2]][moves[movenum][3]])[0];
            piece3.style.left = left_const + board_const * moves[movenum][1] + 'px';
            piece3.style.top = top_const + board_const * moves[movenum][0] + 'px';
            matrix[moves[movenum][0]][moves[movenum][1]] = matrix[moves[movenum][2]][moves[movenum][3]];
            matrix[moves[movenum][2]][moves[movenum][3]] = 'empty';
        }

        let matrix = [
            ['br', 'bn', 'bb', 'bq', 'bk', 'bb2', 'bn2', 'br2'],
            ['bp1', 'bp2', 'bp3', 'bp4', 'bp5', 'bp6', 'bp7', 'bp8'],
            ['empty', 'empty', 'empty', 'empty', 'empty', 'empty', 'empty', 'empty'],
            ['empty', 'empty', 'empty', 'empty', 'empty', 'empty', 'empty', 'empty'],
            ['empty', 'empty', 'empty', 'empty', 'empty', 'empty', 'empty', 'empty'],
            ['empty', 'empty', 'empty', 'empty', 'empty', 'empty', 'empty', 'empty'],
            ['wp1', 'wp2', 'wp3', 'wp4', 'wp5', 'wp6', 'wp7', 'wp8'],
            ['wr', 'wn', 'wb', 'wq', 'wk', 'wb2', 'wn2', 'wr2']
        ];
        let gamesnamelist = [
            'london opening',
            'stonewall opening',
            'colle opening',
            'ruy lopez',
            'sicilian defence',
            'italian game',
            'french defence',
            'karo kann',
            'english openign'
        ];
        let games = [
            [
                [6, 3, 4, 3],
                [1, 3, 3, 3],
                [4,3,3,3]
            ],
            [
                [6, 3, 4, 3],
                [1, 3, 3, 3],
                [6, 4, 5, 4],
                [0, 6, 2, 5],
                [7, 5, 5, 3],
                [1, 4, 2, 4],
                [7,1,6,3],
                [0,5,2,3],
                [6,5,4,5],
                [0,4,0,6],
                [0,7,0,5],
                [7,6,5,5],
                [0,1,2,2],
                [5,5,3,4]
            ]
        ];
        let left_const = 100;
        let top_const = 28;
        let board_const = 80;
        let selected = false;
        let selposi = [0, 0];
        let movenum = 0;
        let moves=games[1];

        initialize();

        document.addEventListener('click', (event) => {
            let x = Math.floor((event.clientX - left_const) / 80);
            let y = Math.floor((event.clientY - 30) / 80);

            if (!selected) {
                if (matrix[y][x] != 'empty') {
                    selected = true;
                    selposi = [x, y];
                }
            }
            else {
                selected = false;
                let piece2 = document.getElementsByClassName(matrix[selposi[1]][selposi[0]])[0];
                if (x != selposi[0] || y != selposi[1]) {
                    piece2.style.left = left_const + board_const * x + 'px';
                    piece2.style.top = top_const + board_const * y + 'px';
                    matrix[y][x] = matrix[selposi[1]][selposi[0]];
                    matrix[selposi[1]][selposi[0]] = 'empty';
                }
            }
        });
        let right = document.getElementsByClassName('btnright')[0];
        right.addEventListener('click', () => {
            forward();
        })
        let left = document.getElementsByClassName('btnleft')[0];
        left.addEventListener('click', () => {
            backward();
        })

        const gamelist = document.getElementsByClassName('gamelist')[0];

        gamesnamelist.forEach((text, index) => {
            const newDiv = document.createElement('div');
            newDiv.textContent = text;
            newDiv.classList.add('gamenames');
            newDiv.addEventListener('click', (e) => {
                moves = games[index];
            })
            gamelist.appendChild(newDiv);
        });
    </script>
</body>

</html>
